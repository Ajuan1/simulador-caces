<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Simulador CACES</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
padding:20px;
}

.container{
background:white;
padding:20px;
border-radius:10px;
max-width:600px;
margin:auto;
}

button{
background:#25D366;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

.progress{
height:10px;
background:#ddd;
margin-top:10px;
}

.progress-bar{
height:10px;
background:#4CAF50;
width:0%;
}

.opcion{
display:block;
margin:10px;
padding:10px;
background:#eee;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>Simulador CACES</h1>

<div id="inicio">

<h2>¿Estás listo para el CACES?</h2>

<select id="carrera">
<option value="MEDICINA">Medicina</option>
<option value="ODONTOLOGIA">Odontología</option>
<option value="ENFERMERIA">Enfermería</option>
</select>

<br><br>

<input id="nombre" placeholder="Nombre"><br><br>
<input id="apellido" placeholder="Apellido"><br><br>

<button onclick="empezar()">Empezar simulacro</button>

</div>

<div id="quiz" style="display:none">

<div id="timer">Tiempo: 8:00</div>

<div class="progress">
<div class="progress-bar" id="barra"></div>
</div>

<h3 id="pregunta"></h3>

<div id="opciones"></div>

</div>

<div id="resultado" style="display:none">

<h2 id="nota"></h2>

<a id="whatsapp" target="_blank">
<button>Ir a WhatsApp</button>
</a>

</div>

</div>

<script>

let preguntas = [

{carrera:"MEDICINA",p:"Órgano afectado en hepatitis",r:"Hígado",o:["Hígado","Pulmón","Riñón","Corazón"]},
{carrera:"MEDICINA",p:"Valor normal de temperatura",r:"37",o:["35","37","39","41"]},
{carrera:"MEDICINA",p:"Hormona de la insulina",r:"Páncreas",o:["Hígado","Páncreas","Riñón","Pulmón"]},
{carrera:"MEDICINA",p:"Vitamina del sol",r:"D",o:["A","B","C","D"]},
{carrera:"MEDICINA",p:"Frecuencia cardiaca normal adulto",r:"60-100",o:["30-50","60-100","120-150","200"]},

{carrera:"ODONTOLOGIA",p:"Tejido duro del diente",r:"Esmalte",o:["Pulpa","Esmalte","Encía","Ligamento"]},
{carrera:"ODONTOLOGIA",p:"Caries afecta primero",r:"Esmalte",o:["Pulpa","Esmalte","Hueso","Encía"]},
{carrera:"ODONTOLOGIA",p:"Número de dientes adulto",r:"32",o:["20","28","30","32"]},
{carrera:"ODONTOLOGIA",p:"Enfermedad de encías",r:"Gingivitis",o:["Caries","Gingivitis","Herpes","Fluorosis"]},
{carrera:"ODONTOLOGIA",p:"Especialista en encías",r:"Periodoncista",o:["Ortodontista","Endodoncista","Periodoncista","Cirujano"]},

{carrera:"ENFERMERIA",p:"Presión normal",r:"120/80",o:["80/50","100/60","120/80","160/100"]},
{carrera:"ENFERMERIA",p:"Vía para medicamentos rápidos",r:"Intravenosa",o:["Oral","Intravenosa","Subcutánea","Tópica"]},
{carrera:"ENFERMERIA",p:"Equipo para presión",r:"Tensiómetro",o:["Termómetro","Tensiómetro","Glucómetro","Estetoscopio"]},
{carrera:"ENFERMERIA",p:"Temperatura alta",r:"Fiebre",o:["Hipotermia","Fiebre","Apnea","Hipoxia"]},
{carrera:"ENFERMERIA",p:"Pulso se mide en",r:"Muñeca",o:["Pie","Muñeca","Nariz","Codo"]}

]

let carrera=""
let lista=[]
let actual=0
let correctas=0
let tiempo=480

function empezar(){

carrera=document.getElementById("carrera").value

lista=preguntas.filter(q=>q.carrera==carrera)

document.getElementById("inicio").style.display="none"
document.getElementById("quiz").style.display="block"

mostrar()
contador()

}

function mostrar(){

let q=lista[actual]

document.getElementById("pregunta").innerText=q.p

let html=""

q.o.forEach(op=>{
html+=`<div class="opcion" onclick="responder('${op}')">${op}</div>`
})

document.getElementById("opciones").innerHTML=html

let progreso=(actual/lista.length)*100
document.getElementById("barra").style.width=progreso+"%"

}

function responder(op){

if(op==lista[actual].r){
correctas++
}

actual++

if(actual>=lista.length){
terminar()
}else{
mostrar()
}

}

function contador(){

let intervalo=setInterval(()=>{

tiempo--

let m=Math.floor(tiempo/60)
let s=tiempo%60

document.getElementById("timer").innerText="Tiempo: "+m+":"+s

if(tiempo<=0){
clearInterval(intervalo)
terminar()
}

},1000)

}

function terminar(){

document.getElementById("quiz").style.display="none"
document.getElementById("resultado").style.display="block"

let nota=Math.round((correctas/lista.length)*100)

document.getElementById("nota").innerText="Tu nota: "+nota+"%"

let mensaje="Hola mi nota fue "+nota+"% y quiero mejorar mi puntaje"

document.getElementById("whatsapp").href="https://wa.me/?text="+encodeURIComponent(mensaje)

}

</script>

</body>
</html>
